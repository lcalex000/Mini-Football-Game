<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FootyGame — ArcadeMiniJS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            background: #000;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Barlow Condensed', 'DM Sans', sans-serif;
            -webkit-overflow-scrolling: touch;
            position: fixed;
            top: 0; left: 0;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: 100dvh;
        }
        #game {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }
        canvas {
            touch-action: none;
            cursor: crosshair;
            display: block;
            /* Safe area padding for notched phones */
            max-width: calc(100vw - env(safe-area-inset-left) - env(safe-area-inset-right));
            max-height: calc(100vh - env(safe-area-inset-top) - env(safe-area-inset-bottom));
            max-height: calc(100dvh - env(safe-area-inset-top) - env(safe-area-inset-bottom));
        }

        /* Rotate prompt — hidden by default, shown via JS in portrait on mobile */
        #rotate-prompt {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #111;
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-family: 'Barlow Condensed', 'DM Sans', sans-serif;
            text-align: center;
            padding: 2rem;
        }
        #rotate-prompt.visible { display: flex; }
        #rotate-prompt .phone-icon {
            font-size: 64px;
            margin-bottom: 1rem;
            animation: rotate-hint 2.5s ease-in-out infinite;
        }
        #rotate-prompt p {
            font-size: 16px;
            color: #aaa;
            line-height: 1.6;
            max-width: 280px;
        }
        #rotate-prompt p strong {
            color: #fff;
            font-size: 20px;
            display: block;
            margin-bottom: 0.5rem;
        }
        @keyframes rotate-hint {
            0%, 100% { transform: rotate(0deg); }
            20% { transform: rotate(-90deg); }
            60% { transform: rotate(-90deg); }
            80% { transform: rotate(0deg); }
        }
    </style>
</head>
<body>
<div id="rotate-prompt">
    <div class="phone-icon">📱</div>
    <p><strong>Tilt Your Phone</strong>Rotate to landscape for the best experience</p>
</div>
